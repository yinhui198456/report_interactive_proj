<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商销项目决策报告 · 机会分级汇总看板</title>
<style>
  :root {
    --primary: #1a5276; --primary-light: #2980b9; --accent: #e74c3c; --green: #27ae60;
    --orange: #e67e22; --bg: #f5f7fa; --card-bg: #ffffff; --text: #2c3e50;
    --text-light: #7f8c8d; --border: #dce1e6; --star: #f39c12;
    --shadow: 0 2px 8px rgba(0,0,0,.08); --shadow-hover: 0 4px 16px rgba(0,0,0,.12);
    --nav-width: 260px; --step-height: 32px; --step-font-size: .75rem;
    --progress-color: var(--primary-light); --check-color: var(--green);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
  .progress-bar-wrapper { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 4px; background: #e0e6ed; }
  .progress-bar-fill { height: 100%; width: 0%; background: var(--progress-color); transition: width .4s ease; }
  .progress-label { position: fixed; top: 8px; right: 20px; z-index: 100; font-size: .75rem; color: var(--text-light); background: rgba(255,255,255,.92); padding: 2px 10px; border-radius: 10px; box-shadow: var(--shadow); }
  .app-layout { display: flex; min-height: 100vh; padding-top: 28px; }
  .sidebar { position: fixed; top: 28px; left: 0; bottom: 0; width: var(--nav-width); background: var(--primary); color: #fff; overflow-y: auto; z-index: 50; display: flex; flex-direction: column; box-shadow: 2px 0 12px rgba(0,0,0,.12); }
  .sidebar-header { padding: .8rem .7rem .5rem; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar-header h2 { font-size: .82rem; font-weight: 600; line-height: 1.3; }
  .sidebar-header p { font-size: .65rem; opacity: .55; margin-top: .08rem; }
  .zone-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,.38); padding: .45rem .7rem .25rem; font-weight: 600; }
  .sidebar-list { list-style: none; padding: .15rem 0; }
  .sidebar-item { display: flex; align-items: center; gap: .4rem; padding: 0 .7rem; height: var(--step-height); font-size: var(--step-font-size); cursor: pointer; transition: background .2s; border-left: 3px solid transparent; user-select: none; }
  .sidebar-item:hover:not(.locked) { background: rgba(255,255,255,.06); }
  .sidebar-item.active { background: rgba(255,255,255,.1); border-left-color: #fff; font-weight: 600; }
  .sidebar-item.locked { color: rgba(255,255,255,.25); cursor: not-allowed; }
  .sidebar-item.completed .item-icon { border-color: var(--check-color); background: var(--check-color); color: #fff; }
  .sidebar-item.pending .item-icon { border-color: var(--orange); background: var(--orange); color: #fff; }
  .sidebar-item.active .item-icon { border-color: #fff; background: rgba(255,255,255,.1); }
  .sidebar-item.locked .item-icon { border-color: rgba(255,255,255,.1); }
  .item-icon { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: .55rem; flex-shrink: 0; }
  .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,.06); margin: 0; }
  .product-group-header { display: flex; align-items: center; gap: .35rem; padding: 0 .7rem; height: 30px; font-size: .72rem; cursor: pointer; transition: background .2s; border-left: 3px solid transparent; user-select: none; font-weight: 600; }
  .product-group-header:hover { background: rgba(255,255,255,.05); }
  .product-group-header .expand-icon { font-size: .5rem; transition: transform .2s; }
  .product-group-header.expanded .expand-icon { transform: rotate(90deg); }
  .product-sub-items { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
  .product-sub-items.expanded { max-height: 2000px; overflow-y: auto; }
  .product-sub-items .sidebar-item { height: 26px; padding: 0 .7rem 0 1.1rem; }
  .product-sub-items .sidebar-item .item-icon { width: 12px; height: 12px; font-size: .45rem; }
  .product-sub-items .sidebar-item span { font-size: .68rem; }
  .sidebar-products-zone { flex: 1; overflow-y: auto; min-height: 0; }
  .sidebar-products-zone::-webkit-scrollbar { width: 4px; }
  .sidebar-products-zone::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
  .main-content { margin-left: var(--nav-width); flex: 1; padding: 1.6rem 2rem 2.2rem; max-width: 1200px; }
  .report-header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; border-radius: 12px; padding: 1.6rem 2rem; margin-bottom: 1.6rem; box-shadow: var(--shadow); }
  .report-header h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: .35rem; }
  .report-header p { font-size: .82rem; opacity: .82; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .section-title { font-size: 1.1rem; font-weight: 600; color: var(--primary); padding-left: .65rem; border-left: 4px solid var(--primary-light); margin-bottom: .4rem; }
  .section-desc { font-size: .8rem; color: var(--text-light); background: #f0f4f8; border-radius: 8px; padding: .55rem .8rem; margin-bottom: .9rem; border-left: 3px solid var(--primary-light); }
  .data-area { background: var(--card-bg); border-radius: 10px; padding: 1.2rem; box-shadow: var(--shadow); margin-bottom: .9rem; }
  .data-area h3 { font-size: .9rem; font-weight: 600; color: var(--primary); margin-bottom: .5rem; padding-bottom: .2rem; border-bottom: 2px solid var(--primary-light); }
  .data-area h4 { font-size: .86rem; font-weight: 600; margin: .8rem 0 .3rem; }
  .data-area .data-source { font-size: .74rem; color: var(--text-light); margin-bottom: .6rem; }
  .table-wrap { overflow-x: auto; margin-bottom: .55rem; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  thead th { background: var(--primary); color: #fff; padding: .45rem .6rem; text-align: left; font-weight: 600; white-space: nowrap; }
  tbody td { padding: .45rem .6rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #eef5fb; }
  .badge { display: inline-block; padding: .1rem .4rem; border-radius: 4px; font-size: .7rem; font-weight: 500; color: #fff; }
  .badge--green { background: var(--green); } .badge--orange { background: var(--orange); }
  .badge--red { background: var(--accent); } .badge--blue { background: var(--primary-light); }
  .badge--purple { background: #8e44ad; }
  blockquote { border-left: 4px solid var(--primary-light); background: #f0f4f8; margin: .6rem 0; padding: .55rem .75rem; border-radius: 0 6px 6px 0; color: #34495e; font-style: italic; }
  blockquote p { margin-bottom: 0; font-size: .85rem; }
  .input-panel { background: var(--card-bg); border-radius: 10px; padding: 1.2rem; box-shadow: var(--shadow); margin-bottom: .9rem; }
  .input-panel h3 { font-size: .92rem; font-weight: 600; color: var(--primary); margin-bottom: .35rem; }
  .input-panel .input-hint { font-size: .76rem; color: var(--text-light); margin-bottom: .7rem; }
  .interactive-area { background: #fffef7; border: 2px solid #f5e6a3; border-radius: 10px; padding: 1.1rem; margin-bottom: .9rem; }
  .interactive-area h3 { font-size: .88rem; font-weight: 600; color: #7a5600; margin-bottom: .6rem; }
  .form-group { margin-bottom: .65rem; }
  .form-group label { display: block; font-size: .8rem; font-weight: 500; margin-bottom: .18rem; color: var(--text); }
  .form-group input[type="text"], .form-group input[type="number"], .form-group textarea, .form-group select { width: 100%; padding: .4rem .55rem; border: 1px solid var(--border); border-radius: 6px; font-size: .8rem; font-family: inherit; color: var(--text); background: #fff; transition: border-color .2s; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(41,128,185,.1); }
  .form-group textarea { resize: vertical; min-height: 45px; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: .25rem .7rem; }
  .checkbox-group label { display: flex; align-items: center; gap: .22rem; font-size: .8rem; font-weight: 400; cursor: pointer; }
  .radio-group { display: flex; flex-direction: column; gap: .28rem; }
  .radio-group label { display: flex; align-items: center; gap: .28rem; font-size: .82rem; cursor: pointer; }
  .btn-row { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .85rem; }
  .btn { display: inline-flex; align-items: center; gap: .28rem; padding: .42rem 1rem; border: none; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; font-family: inherit; }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--primary-light); color: #fff; } .btn-primary:hover { background: var(--primary); }
  .btn-primary:disabled { background: #b0c4d8; cursor: not-allowed; }
  .btn-secondary { background: #eef2f7; color: var(--text); } .btn-secondary:hover { background: #dce4ee; }
  .btn-success { background: var(--green); color: #fff; } .btn-success:hover { background: #219a52; }
  .btn-warning { background: var(--orange); color: #fff; } .btn-warning:hover { background: #d35400; }
  .btn-danger { background: var(--accent); color: #fff; } .btn-danger:hover { background: #c0392b; }
  .btn-lg { padding: .6rem 1.5rem; font-size: .9rem; }
  .loading-box { text-align: center; padding: 1.3rem .8rem; color: var(--text-light); }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 4px solid #e0e6ed; border-top-color: var(--primary-light); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: .5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .chart-bar-container { display: flex; align-items: flex-end; gap: .5rem; height: 140px; padding: 2.5rem 0 .5rem; border-bottom: 2px solid var(--border); margin-bottom: .5rem; }
  .chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 60px; }
  .chart-bar-fill { width: 60%; margin: 0 auto; background: var(--primary-light); border-radius: 4px 4px 0 0; min-height: 8px; }
  .chart-bar-label { font-size: .6rem; color: var(--text-light); margin-top: .35rem; text-align: center; }
  .chart-bar-value { font-size: .58rem; font-weight: 600; color: var(--primary); margin-bottom: .25rem; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: .5rem; margin-bottom: .75rem; }
  .heatmap-cell { padding: .65rem; border-radius: 6px; text-align: center; }

  .heatmap-cell--high { background: #fde8e8; color: var(--accent); }
  .heatmap-cell .city-name { font-weight: 600; font-size: .85rem; }
  .heatmap-cell .customer-count { font-size: .72rem; margin-top: .2rem; }
  .quadrant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
  .quadrant-card { background: var(--card-bg); border-radius: 8px; padding: .85rem 1rem; box-shadow: var(--shadow); border-left: 4px solid var(--border); }
  .quadrant-card--red { border-left-color: var(--accent); }

  .quadrant-card .q-title { font-weight: 600; font-size: .88rem; margin-bottom: .25rem; }

  .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; margin-bottom: .8rem; }
  .strategy-card { background: var(--card-bg); border-radius: 8px; padding: .85rem 1rem; box-shadow: var(--shadow); border-left: 4px solid var(--border); }
  .strategy-card .s-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .3rem; }
  .strategy-card .s-name { font-weight: 600; font-size: .86rem; }

  .strategy-card .s-condition { font-size: .72rem; color: var(--primary-light); }
  .customer-card { background: var(--card-bg); border-radius: 8px; padding: .85rem 1rem; box-shadow: var(--shadow); margin-bottom: .65rem; border-left: 4px solid var(--primary-light); }
  .customer-card .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }

  .terminal-type-bar { height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .72rem; font-weight: 600; min-width: 140px; padding: 0 .5rem; }
  .summary-basis { list-style: none; padding: 0; }

  .summary-basis li:last-child { border-bottom: none; }
  .summary-basis li::before { content: "\2714\FE0F"; position: absolute; left: 0; top: .3rem; color: var(--green); font-size: .7rem; }
  .product-list-row { display: flex; align-items: center; gap: .5rem; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
  .product-list-row:last-child { border-bottom: none; }

  .product-list-row input[type="text"] { flex: 1; min-width: 0; }
  .filter-bar { display: flex; gap: .5rem; margin-bottom: .75rem; align-items: center; flex-wrap: wrap; }
  .filter-bar label { font-size: .78rem; font-weight: 500; display: flex; align-items: center; gap: .25rem; cursor: pointer; }
  .parse-area, .result-area { padding: .75rem; background: #f9fafb; border-radius: 8px; margin-bottom: .5rem; }
  .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .65rem; margin-bottom: .8rem; }
  .dash-card { background: var(--card-bg); border-radius: 8px; padding: .85rem 1rem; box-shadow: var(--shadow); border-top: 3px solid var(--primary-light); text-align: center; }
  .dash-card .dash-value { font-size: 1.4rem; font-weight: 700; }
  .dash-card .dash-label { font-size: .74rem; color: var(--text-light); margin-top: .15rem; }
  .dash-card--green { border-top-color: var(--green); } .dash-card--green .dash-value { color: var(--green); }
  .dash-card--orange { border-top-color: var(--orange); } .dash-card--orange .dash-value { color: var(--orange); }
  .dash-card--red { border-top-color: var(--accent); } .dash-card--red .dash-value { color: var(--accent); }
  .dash-card--blue { border-top-color: var(--primary-light); } .dash-card--blue .dash-value { color: var(--primary-light); }
  .conclusion-hero {
    background: linear-gradient(135deg, #e8f8ef, #f0f4f8);
    border-radius: 14px; padding: 1.8rem 2rem; margin-bottom: 1rem;
    border: 2px solid var(--green); text-align: center;
    box-shadow: 0 4px 20px rgba(39,174,96,.1);
  }
  .conclusion-hero.warning { background: linear-gradient(135deg, #fff8e1, #f0f4f8); border-color: var(--orange); }
  .conclusion-hero .conclusion-icon { font-size: 2.2rem; margin-bottom: .3rem; }

  .confirm-feedback.show { display: block; animation: fadeIn .3s ease; }

  .scorecard-table { width: 100%; border-collapse: collapse; font-size: .8rem; }

  .scorecard-summary-bar { background: #f0f4f8; border-radius: 8px; padding: .6rem .9rem; margin-top: .8rem; font-size: .82rem; text-align: center; border-left: 4px solid var(--green); }

  .resource-gap { font-size: .78rem; padding: .3rem .5rem; border-radius: 4px; text-align: center; display: inline-block; }

  .resource-gap.danger { background: #fde8e8; color: var(--accent); }
  .opp-section { border-radius: 10px; margin-bottom: .8rem; overflow: hidden; box-shadow: var(--shadow); }

  .opp-section-header--B { background: #fff8e1; color: var(--orange); }
  .opp-section-header--C { background: #eef5fb; color: var(--primary-light); }

  .strategy-group h4 { font-size: .85rem; font-weight: 600; color: var(--primary); margin-bottom: .3rem; }
  .strategy-group .sg-strategy { font-size: .78rem; color: var(--primary-light); margin-top: .3rem; }

function saveProjectPolicy() {
  const rows = document.querySelectorAll('#productListContainer .product-list-row');
  state.productList = [];
  rows.forEach(row => { const n = row.querySelector('.prod-name')?.value.trim(); const s = row.querySelector('.prod-spec')?.value.trim(); const e = row.querySelector('input[type="checkbox"]')?.checked!==false; if(n&&e) state.productList.push({name:n,spec:s}); });

  state.projectPolicy = {
    agreement: document.getElementById('policyAgreement')?.value||'',
    repCount: parseInt(document.getElementById('projRepCountInput')?.value)||0,
    repCost: parseFloat(document.getElementById('projRepCostInput')?.value)||0,

    productList: state.productList,

function parseAgreement() {
  const text = document.getElementById('policyAgreementParse')?.value.trim();

  unique.forEach(name => { if (!state.productList.find(p => p.name === name)) { state.productList.push({name,spec:'10mg×42片/盒'}); }});

  if (unique.length === 0) alert('未解析到商品，请手动添加');

    {n:10, t:'该商品推广机会清单', s:'基于六维评估，识别该商品在各客户上的推广机会并按成功概率分级。',
     c:'<p style="font-size:.82rem;color:var(--text-light);">推广机会清单基于"商品×客户"对的六维评分（合作基础25%、协同机会20%、竞品替代15%、客户价值15%、触达成本15%、政策适配10%）生成。A级为高成功概率(60-80%)立即推广项，B级需持续培育，C级通过数字化手段批量触达。广阔市场以单体药店和诊所为主。</p>'},

  ];

  var modHtml = modules.map(function(m){

// ═══════════════════════════════════════════════════════
// Sidebar
// ═══════════════════════════════════════════════════════
function renderSidebar() {
  var sb = document.getElementById('sidebar');
  var isDash = state.phase >= 1 && state.generated;
  var h = '<div class="sidebar-header"><h2>商销项目决策向导</h2><p>'+(state.projectInfo?state.projectInfo.name:'多商品项目')+'</p></div>';

  // 始终显示录入步骤（看板阶段也可点击回去修改）
  h += '<div class="zone-label">项目信息录入</div><ul class="sidebar-list">';
  var i1 = state.projectInfo !== null;
  var i2 = state.projectPolicy !== null;
  var label1 = i1 ? '✔' : '1';
  var label2 = isDash ? '✏️' : (i2 ? '✔' : '2');  // 看板阶段显示✏️表示可修改
  h += '<li class="sidebar-item'+(state.currentPanel==='proj-projectInfo'?' active':'')+'" onclick="showPanel(\'proj-projectInfo\')"><span class="item-icon">'+label1+'</span><span>Step 1: 项目基本信息</span></li>';
  h += '<li class="sidebar-item'+(state.currentPanel==='proj-projectPolicy'?' active':'')+'" onclick="showPanel(\'proj-projectPolicy\')"><span class="item-icon">'+label2+'</span><span>Step 2: 政策框架 & 商品清单</span></li>';
  h += '</ul>';

  // 看板阶段额外显示决策中心和下钻入口
  if (isDash) {
    h += '<hr class="sidebar-divider"><div class="zone-label">决策中心</div><ul class="sidebar-list">';
    h += '<li class="sidebar-item'+(state.currentPanel==='dashboard'?' active':'')+'" onclick="showPanel(\'dashboard\')"><span class="item-icon">'+(state.confirmed?'✅':'📊')+'</span><span>决策汇总看板'+(state.confirmed?' · 已确认':' ★')+'</span></li>';
    h += '</ul><hr class="sidebar-divider"><div class="zone-label">按商品下钻</div><div class="sidebar-products-zone"><ul class="sidebar-list">';
    var currentProdId = null;
    if (state.currentPanel && state.currentPanel.startsWith('detail-')) {
      currentProdId = state.currentPanel.replace('detail-','');
    }
    MOCK_PRODUCTS.forEach(function(prod){
      var da = state.currentPanel==='detail-'+prod.id;
      h += '<li class="product-group-header'+(da?' expanded':'')+'" onclick="navigateToProduct(\''+prod.id+'\')">'+
        '<span class="expand-icon">'+(da?'▼':'▶')+'</span>'+
        '<span class="item-icon">📦</span>'+
        '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+prod.name+'</span></li>';
      if (da) {
        h += '<div class="product-sub-items expanded"><ul class="sidebar-list">';
        h += '<li class="sidebar-item" style="height:20px;padding:0 .7rem;"><span style="font-size:.6rem;color:rgba(255,255,255,.4);">商品分析模块</span></li>';
        var modNames = ['商品基本信息','竞品与协同品','本品流向','客户覆盖','竞品覆盖','外部拓客','价格(本品)','价格(竞品)','政策评估','推广机会','营销策略','客户清单'];
        for (var mi = 1; mi <= 12; mi++) {
          h += '<li class="sidebar-item" onclick="scrollToModule(\''+prod.id+'\','+mi+')"><span class="item-icon" style="width:11px;height:11px;font-size:.4rem;">'+mi+'</span><span>'+mi+'. '+modNames[mi-1]+'</span></li>';
        }
        h += '<li class="sidebar-item" onclick="navigateToDashboard()" style="border-top:1px solid rgba(255,255,255,.1);"><span class="item-icon" style="width:11px;height:11px;font-size:.4rem;">←</span><span>返回看板</span></li>';
        h += '</ul></div>';
      }
    });
    h += '</ul></div>';
  }
  sb.innerHTML = h;
}

// ═══════════════════════════════════════════════════════
// Progress & Persistence
// ═══════════════════════════════════════════════════════
function updateProgress() {
  var t, d, pct;
  if (!state.generated) {
    t = 2; d = (state.projectInfo?1:0)+(state.projectPolicy?1:0);
    pct = Math.round((d/t)*100);
    document.getElementById('progressLabel').textContent = 'Step '+(d+1)+' / '+t;
  } else {
    t = 2; d = 1+(state.confirmed?1:0);
    pct = Math.round((d/t)*100);
    document.getElementById('progressLabel').textContent = state.confirmed?'✅ 项目已确认启动':'✅ 已生成 · 等待确认';
  }
  document.getElementById('progressFill').style.width = pct+'%';
}

function saveState() {
  try {
    localStorage.setItem('proj_report_v5', JSON.stringify({
      phase:state.phase, projectInfo:state.projectInfo, projectPolicy:state.projectPolicy,
      productList:state.productList, generated:state.generated, confirmed:state.confirmed,
    }));
  } catch(e) {}
  updateProgress();
}

function loadState() {
  try {
    var saved = JSON.parse(localStorage.getItem('proj_report_v5'));
    if (saved) {
      state.phase = saved.phase || 0;
      state.projectInfo = saved.projectInfo || null;
      state.projectPolicy = saved.projectPolicy || null;
      state.productList = saved.productList || [];
      state.generated = saved.generated || false;
      state.confirmed = saved.confirmed || false;
      if (state.projectInfo) document.getElementById('projectTitle').textContent = state.projectInfo.name;
      return true;
    }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════
function init() {
  initState();
  buildPanels();
  var loaded = loadState();
  renderSidebar();
  if (loaded && state.phase >= 1 && state.generated) {
    showPanel('dashboard');
  } else {
    showPanel('proj-projectInfo');
  }
  updateProgress();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
